<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITFLIX HD</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
  :root {
    --bg: #080810;
    --surface: #10101c;
    --surface2: #181828;
    --border: #252538;
    --accent: #e63946;
    --accent2: #f4a261;
    --text: #f0f0f8;
    --muted: #5a5a7a;
    --green: #2ec27e;
    --purple: #818cf8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4;
  }

  /* ══════════════════════════════════
     LOADING OVERLAY
  ══════════════════════════════════ */
  #loadingOverlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 5000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }

  #loadingOverlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .loading-poster-wrap {
    position: relative;
    width: 140px;
    height: 210px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    margin-bottom: 28px;
    flex-shrink: 0;
  }

  .loading-poster-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .loading-poster-placeholder {
    width: 100%; height: 100%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem;
  }

  .loading-poster-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(110deg,
      transparent 0%,
      rgba(255,255,255,0.06) 40%,
      rgba(255,255,255,0.12) 50%,
      transparent 60%
    );
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .loading-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: var(--text);
    text-align: center;
    max-width: 320px;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .loading-year {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 28px;
    letter-spacing: 1px;
  }

  /* Barra de progresso animada */
  .loading-bar-wrap {
    width: 240px;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .loading-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
    position: relative;
  }

  .loading-bar-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0;
    width: 40px; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
    animation: bar-glow 0.8s ease-in-out infinite alternate;
  }

  @keyframes bar-glow {
    from { opacity: 0.3; }
    to   { opacity: 1; }
  }

  .loading-status {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-align: center;
    min-height: 18px;
    transition: color 0.3s;
  }

  .loading-status.ok   { color: var(--green); }
  .loading-status.err  { color: var(--accent); }

  /* Dots animados */
  .loading-dots {
    display: flex; gap: 6px; margin-top: 20px;
  }

  .loading-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: dot-bounce 1.2s ease-in-out infinite;
    opacity: 0.4;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; background: var(--purple); }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.3; }
    40%            { transform: scale(1.2); opacity: 1; }
  }

  /* ══════════════════════════════════
     HEADER
  ══════════════════════════════════ */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(8,8,16,0.94);
    backdrop-filter: blur(24px);
    z-index: 100;
  }

  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 3px; display: flex; align-items: center; gap: 8px; }
  .logo-accent { color: var(--accent); }
  .logo-sub { font-size: 0.85rem; color: var(--muted); letter-spacing: 4px; font-family: 'Bebas Neue', sans-serif; }

  .nav-back {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 9px; color: var(--muted);
    font-size: 0.8rem; font-weight: 600;
    padding: 8px 14px; text-decoration: none; transition: all 0.18s; cursor: pointer;
  }
  .nav-back:hover { color: var(--text); border-color: var(--muted); }

  /* ══════════════════════════════════
     MAIN LAYOUT
  ══════════════════════════════════ */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 24px 80px;
  }

  /* ══════════════════════════════════
     PLAYER SECTION
  ══════════════════════════════════ */
  .player-section {
    background: #000;
    border-radius: 16px 16px 0 0;
    overflow: hidden;
    position: relative;
    box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    margin-bottom: 0;
    border: 1px solid var(--border);
    border-bottom: none;
  }

  .player-section video {
    width: 100%;
    display: block;
    max-height: 560px;
    background: #000;
    outline: none;
  }

  /* Banner quando não tem URL ainda */
  .player-banner {
    width: 100%;
    aspect-ratio: 16/9;
    max-height: 560px;
    background: linear-gradient(135deg, #0a0a14 0%, #181828 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
  }

  .player-banner-icon {
    width: 72px; height: 72px;
    background: rgba(230,57,70,0.12);
    border: 1px solid rgba(230,57,70,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .player-banner p {
    color: var(--muted); font-size: 0.85rem;
  }

  /* Barra inferior do player */
  .player-meta-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .player-movie-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.15rem; letter-spacing: 2px;
    flex: 1;
  }

  .player-chip {
    font-size: 0.65rem; font-weight: 700;
    padding: 3px 8px; border-radius: 5px;
    text-transform: uppercase; letter-spacing: 0.5px;
    background: rgba(230,57,70,0.12); color: var(--accent);
    border: 1px solid rgba(230,57,70,0.25);
  }

  .player-chip.quality {
    background: rgba(129,140,248,0.12); color: var(--purple);
    border-color: rgba(129,140,248,0.25);
  }

  /* Botão de qualidade / link */
  .quality-select-wrap {
    display: flex; gap: 6px;
  }

  .quality-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--muted);
    font-size: 0.72rem; font-weight: 700;
    padding: 6px 12px; cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .quality-btn.active {
    background: rgba(230,57,70,0.15); border-color: var(--accent);
    color: var(--accent);
  }

  .quality-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

  /* ══════════════════════════════════
     ERRO / NENHUM LINK
  ══════════════════════════════════ */
  .no-stream-box {
    padding: 20px 18px;
    background: rgba(230,57,70,0.06);
    border: 1px solid rgba(230,57,70,0.2);
    border-radius: 12px;
    margin-bottom: 24px;
    display: none;
    align-items: center; gap: 12px;
  }

  .no-stream-box.visible { display: flex; }
  .no-stream-box p { font-size: 0.83rem; color: var(--accent); }
  .no-stream-box span { font-size: 1.4rem; }

  /* ══════════════════════════════════
     INFORMAÇÕES DA SÉRIE
  ══════════════════════════════════ */
  .movie-info-row {
    display: flex; gap: 20px; margin-bottom: 32px;
    align-items: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .movie-poster-side {
    width: 110px; flex-shrink: 0;
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,0.7);
    align-self: center;
  }

  .movie-poster-side img {
    width: 100%; aspect-ratio: 2/3;
    object-fit: cover; display: block;
  }

  .movie-poster-placeholder {
    width: 100%; aspect-ratio: 2/3;
    background: var(--surface2);
    display: flex; align-items: center;
    justify-content: center; color: var(--muted);
    font-size: 2rem;
  }

  .movie-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }

  .movie-details-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem; letter-spacing: 3px;
    line-height: 1.1; margin-bottom: 10px;
  }

  .movie-details-meta {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
  }

  .meta-tag {
    font-size: 0.67rem; font-weight: 700;
    padding: 3px 9px; border-radius: 5px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .meta-year  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .meta-rat   { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
  .meta-genre { background: rgba(129,140,248,0.1); color: var(--purple); border: 1px solid rgba(129,140,248,0.2); }
  .meta-tv    { background: rgba(230,57,70,0.1); color: var(--accent); border: 1px solid rgba(230,57,70,0.25); }

  .movie-overview {
    font-size: 0.82rem; line-height: 1.68;
    color: rgba(240,240,248,0.65);
    display: -webkit-box; -webkit-line-clamp: 4;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  /* ══════════════════════════════════
     SEÇÃO SUGESTÕES
  ══════════════════════════════════ */
  .section-title {
    font-weight: 700; font-size: 1rem;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1; height: 1px;
    background: var(--border);
  }

  .suggestions-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .sug-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
  }

  .sug-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    border-color: rgba(230,57,70,0.35);
  }

  .sug-poster-wrap {
    position: relative;
    width: 100%; aspect-ratio: 2/3;
  }

  .sug-poster-wrap img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  .sug-no-poster {
    width: 100%; height: 100%;
    background: var(--surface2);
    display: flex; align-items: center;
    justify-content: center; color: var(--muted);
    font-size: 1.8rem;
  }

  .sug-rating {
    position: absolute; top: 6px; left: 6px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    border-radius: 5px;
    font-size: 0.65rem; font-weight: 700;
    padding: 3px 7px; color: #fbbf24;
  }

  .sug-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(8,8,16,0.92) 0%, transparent 55%);
    opacity: 0; transition: opacity 0.2s;
    display: flex; align-items: flex-end; padding: 10px;
  }

  .sug-card:hover .sug-overlay { opacity: 1; }

  .sug-play-btn {
    width: 100%;
    background: var(--accent); border: none; border-radius: 6px;
    color: #fff; font-size: 0.72rem; font-weight: 700;
    padding: 7px; cursor: pointer; text-align: center;
  }

  .sug-body { padding: 8px 10px 10px; }

  .sug-title {
    font-size: 0.78rem; font-weight: 600;
    line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 4px;
  }

  .sug-year { font-size: 0.65rem; color: var(--muted); }

  /* Loading esqueleto das sugestões */
  .skel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }

  .skel-poster {
    width: 100%; aspect-ratio: 2/3;
    background: var(--surface2);
    position: relative; overflow: hidden;
  }

  .skel-poster::after, .skel-text::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(110deg,
      transparent 30%,
      rgba(255,255,255,0.05) 50%,
      transparent 70%
    );
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  .skel-body { padding: 8px 10px 10px; }

  .skel-text {
    height: 10px; background: var(--surface2);
    border-radius: 4px; margin-bottom: 6px;
    position: relative; overflow: hidden;
  }

  .skel-text.short { width: 55%; }

  /* ══════════════════════════════════
     TOAST
  ══════════════════════════════════ */
  #toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px; font-size: 0.8rem;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45); z-index: 9000;
    transform: translateY(60px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--green); }
  #toast.error   { border-color: var(--accent); }
  .toast-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .success .toast-dot { background: var(--green); }
  .error   .toast-dot { background: var(--accent); }

  /* ══════════════════════════════════
     BARRA DE EPISÓDIOS (abaixo do player)
  ══════════════════════════════════ */
  .ep-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 14px 0 14px;
    margin-bottom: 24px;
    display: none;
  }

  .ep-bar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 8px;
  }

  .ep-bar-label {
    font-size: 0.72rem; font-weight: 800; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.8px;
  }

  .season-tabs-bar {
    display: flex; gap: 6px; padding: 0 16px 10px;
    overflow-x: auto; scrollbar-width: none;
  }
  .season-tabs-bar::-webkit-scrollbar { display: none; }

  .s-tab {
    flex-shrink: 0; padding: 5px 14px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 700;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .s-tab:hover { border-color: var(--muted); color: var(--text); }
  .s-tab.active {
    background: rgba(230,57,70,0.15);
    border-color: rgba(230,57,70,0.55); color: var(--accent);
  }

  /* scroll horizontal dos cards */
  .ep-scroll {
    display: flex; gap: 10px;
    padding: 2px 16px 6px;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .ep-scroll::-webkit-scrollbar { height: 3px; }
  .ep-scroll::-webkit-scrollbar-track { background: transparent; }
  .ep-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .ep-card {
    flex-shrink: 0; width: 128px;
    scroll-snap-align: start;
    border-radius: 10px; overflow: hidden;
    border: 2px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: border-color 0.18s, transform 0.15s;
    position: relative;
  }
  .ep-card:hover { transform: scale(1.04); border-color: rgba(230,57,70,0.45); }
  .ep-card.playing {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(230,57,70,0.3);
  }
  .ep-card.unavailable { opacity: 0.38; cursor: default; pointer-events: none; }

  /* linha vermelha no topo do card ativo */
  .ep-card.playing::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent); z-index: 4;
  }

  .ep-card-thumb {
    width: 100%; height: 72px; position: relative;
    background: #0d0d1a; overflow: hidden;
  }
  .ep-card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ep-thumb-ph {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 1.5rem;
  }

  /* ícone play overlay */
  .ep-card-thumb-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .ep-card:hover .ep-card-thumb-overlay,
  .ep-card.playing .ep-card-thumb-overlay { opacity: 1; }

  .ep-now-badge {
    position: absolute; top: 5px; left: 5px; z-index: 3;
    background: var(--accent); color: #fff;
    font-size: 0.52rem; font-weight: 900;
    padding: 2px 6px; border-radius: 4px;
    letter-spacing: 0.6px; text-transform: uppercase;
  }

  .ep-card-body { padding: 7px 8px 9px; }
  .ep-card-num {
    font-size: 0.6rem; color: var(--muted); font-weight: 700;
    margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .ep-card.playing .ep-card-num { color: var(--accent); }
  .ep-card-name {
    font-size: 0.72rem; font-weight: 600; line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  /* ══════════════════════════════════
     RESPONSIVO
  ══════════════════════════════════ */
  @media (max-width: 600px) {
    .main { padding: 16px 12px 60px; }
    .suggestions-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .movie-info-row { flex-direction: row; padding: 14px; gap: 14px; }
    .movie-poster-side { width: 88px; }
    .movie-details-title { font-size: 1.25rem; }
    .ep-card { width: 112px; }
    .ep-card-thumb { height: 63px; }

    /* ── Player fixo no topo ao rolar no mobile ── */
    .player-section {
      position: sticky;
      top: 57px;
      z-index: 90;
      border-radius: 0;
      margin-left: -12px;
      margin-right: -12px;
      border-left: none;
      border-right: none;
    }

    /* ── Barra de episódios gruda logo abaixo do player ── */
    .ep-bar {
      position: sticky;
      top: calc(57px + 56.25vw);
      z-index: 89;
      border-radius: 0;
      margin-left: -12px;
      margin-right: -12px;
      border-left: none;
      border-right: none;
      margin-bottom: 16px;
    }
  }
</style>
</head>
<body>

<!-- ══ LOADING OVERLAY ══════════════════════ -->
<div id="loadingOverlay">
  <div class="loading-poster-wrap">
    <img id="loadingPoster" src="" alt="" style="display:none">
    <div class="loading-poster-placeholder" id="loadingPosterFallback">🎬</div>
    <div class="loading-poster-shimmer"></div>
  </div>

  <div class="loading-title" id="loadingTitle">Carregando Filme</div>
  <div class="loading-year"  id="loadingYear"></div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIGURAÇÃO
// ══════════════════════════════════════════════════════
const TMDB_KEY  = 'c311ad203b7db4a3bf1e1275ecdf41de';
const TMDB_IMG  = 'https://image.tmdb.org/t/p/w500';

// GitHub config — lê do localStorage (mesmo usado pelo filmes-github.html)
let ghCfg = { repo: '', path: '' };
try {
  const c = localStorage.getItem('cinelist_filmes_cfg')
         || localStorage.getItem('cinelist_gh_config');
  if (c) ghCfg = JSON.parse(c);
} catch(e) {}

// ══════════════════════════════════════════════════════
//  ESTADO ATUAL
// ══════════════════════════════════════════════════════
let currentMovie  = null;
let videoUrlsList = [];
let hlsInstance   = null;
let allSeries     = [];       // lista de séries para sugestões
let seriesData    = null;     // seasons[] da série atual
let currentEpUrl  = null;     // URL exata do ep em reprodução

// ══════════════════════════════════════════════════════
//  PARÂMETROS DA URL
// ══════════════════════════════════════════════════════
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

// ══════════════════════════════════════════════════════
//  INICIALIZAÇÃO
// ══════════════════════════════════════════════════════
(async function init() {
  // Tenta recuperar o filme do sessionStorage (passado pelo filmes-github.html)
  let movie = null;
  try {
    const raw = sessionStorage.getItem('cinelist_player_movie');
    if (raw) movie = JSON.parse(raw);
  } catch(e) {}

  // Fallback: tenta pelo ID na URL + carrega lista do GitHub
  if (!movie) {
    const id = getParam('id');
    if (id) {
      movie = await loadMovieById(id);
    }
  }

  if (!movie) {
    setLoadingStatus('Nenhum filme selecionado.', 'err');
    setProgress(100);
    setTimeout(() => hideLoading(), 1500);
    return;
  }

  currentMovie = movie;
  currentEpUrl = (movie.video_link && movie.video_link.trim()) ? movie.video_link.trim() : null;

  populateLoadingScreen(movie);
  populateMovieInfo(movie);

  // Carrega episódios e sugestões em paralelo
  loadSeriesEpisodes(movie.id || movie.tmdb_id);
  loadSuggestions();

  // Inicia extração de links
  setProgress(15);
  setLoadingStatus('Buscando link de vídeo...');

  const videoLink = movie.video_link && movie.video_link.trim()
    ? movie.video_link.trim()
    : null;

  if (videoLink) {
    setProgress(40);
    // Verifica se já é um link direto de vídeo
    if (isDirectVideoUrl(videoLink)) {
      setLoadingStatus('Link direto encontrado! Abrindo player...');
      setProgress(90);
      setTimeout(() => {
        setProgress(100);
        hideLoading();
        handleExtractedUrls([videoLink]);
      }, 600);
    } else {
      setLoadingStatus('Link encontrado! Iniciando extração...');
      triggerExtractor(videoLink);
    }
  } else {
    setProgress(100);
    setLoadingStatus('Sem link de vídeo cadastrado.', 'err');
    setTimeout(() => {
      hideLoading();
      showNoStream('Este filme ainda não possui link de vídeo.');
    }, 1200);
  }
})();

// ══════════════════════════════════════════════════════
//  LOADING SCREEN
// ══════════════════════════════════════════════════════
function populateLoadingScreen(movie) {
  const t = movie.titulo || movie.title || 'Sem título';
  const y = movie.ano || movie.year || '';
  document.getElementById('loadingTitle').textContent = t;
  document.getElementById('loadingYear').textContent  = y ? `• ${y}` : '';

  const poster = movie.poster || null;
  const tmdbId = movie.id || movie.tmdb_id || null;

  if (poster) {
    showLoadingPoster(poster);
  } else if (tmdbId) {
    fetchPoster(tmdbId).then(url => { if (url) showLoadingPoster(url); });
  }
}

function showLoadingPoster(url) {
  const img = document.getElementById('loadingPoster');
  const fb  = document.getElementById('loadingPosterFallback');
  img.src = url;
  img.style.display = 'block';
  fb.style.display  = 'none';
}

function setProgress(pct) {
  document.getElementById('loadingBarFill').style.width = pct + '%';
}

function setLoadingStatus(msg, type) {
  const el = document.getElementById('loadingStatus');
  el.textContent = msg;
  el.className   = 'loading-status' + (type ? ' ' + type : '');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.add('hidden');
}

// ══════════════════════════════════════════════════════
//  EXTRAÇÃO DE VÍDEO — inline (sem iframe)
// ══════════════════════════════════════════════════════

const VIDEO_EXTS = ['mp4','webm','ogg','m3u8','m3u','ts','mov','avi','mkv','flv','wmv'];

function getVideoType(url) {
  try {
    const u = new URL(url);
    const path = u.pathname.toLowerCase();
    for (const ext of VIDEO_EXTS) {
      if (path.endsWith('.' + ext)) return ext;
    }
    if (path.includes('m3u8') || u.search.includes('m3u8')) return 'm3u8';
    if (path.includes('.mp4') || u.search.includes('mp4'))  return 'mp4';
    if (path.includes('video') || path.includes('stream') || path.includes('media')) return 'stream';
  } catch(_) {}
  return null;
}

function extractVideoUrls(html, baseUrl) {
  const found = new Set();

  const srcRe = /(?:src|data-src|data-url|file|videourl|video_url|streamurl)\s*[:=]\s*["']([^"']+)["']/gi;
  let m;
  while ((m = srcRe.exec(html)) !== null) tryAdd(m[1], baseUrl, found);

  const jsRe = /["'`](https?:\/\/[^"'`\s]+\.(?:mp4|webm|m3u8|m3u|ogg|ts|mov)[^"'`\s]*)["'`]/gi;
  while ((m = jsRe.exec(html)) !== null) tryAdd(m[1], baseUrl, found);

  const manifestRe = /(?:manifest|hlsUrl|hls_url|sourceUrl|source_url|videoSrc|video_src|streamUrl|stream_url)\s*[=:]\s*["'`]([^"'`\s]+)["'`]/gi;
  while ((m = manifestRe.exec(html)) !== null) tryAdd(m[1], baseUrl, found);

  const jsonRe = /"(?:src|url|file|stream|source|hls|video)"\s*:\s*"(https?:\/\/[^"]+)"/gi;
  while ((m = jsonRe.exec(html)) !== null) tryAdd(m[1], baseUrl, found);

  const iframeRe = /<iframe[^>]+src=["']([^"']+)["'][^>]*>/gi;
  while ((m = iframeRe.exec(html)) !== null) {
    const u = m[1];
    if (/youtube|youtu\.be|vimeo|dailymotion|twitch|facebook.*video/i.test(u)) found.add(u);
  }

  return [...found];
}

function tryAddUrl(raw, baseUrl, set) {
  try {
    const u = raw.startsWith('http') ? raw : new URL(raw, baseUrl).href;
    if (getVideoType(u)) set.add(u);
  } catch(_) {}
}
// alias para compatibilidade interna
function tryAdd(raw, baseUrl, set) { tryAddUrl(raw, baseUrl, set); }

const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://cors-anywhere.herokuapp.com/${u}`,
];

async function fetchWithProxy(url) {
  const errors = [];
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy(url), {
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        signal: AbortSignal.timeout(15000)
      });
      if (res.ok) {
        const text = await res.text();
        return { text, proxyUsed: proxy(url) };
      }
    } catch(e) { errors.push(e.message); }
  }
  throw new Error('Todos os proxies falharam: ' + errors.join(', '));
}

// Verifica se a URL já é um link direto de vídeo (não precisa de extração)
function isDirectVideoUrl(url) {
  try {
    const u = new URL(url);
    const path = u.pathname.toLowerCase();
    const directExts = ['mp4','webm','ogg','m3u8','m3u','ts','mov'];
    for (const ext of directExts) {
      if (path.endsWith('.' + ext)) return true;
    }
    if (path.includes('m3u8') || u.search.includes('m3u8')) return true;
    if (path.includes('.mp4') || u.search.includes('.mp4')) return true;
  } catch(_) {}
  return false;
}

function triggerExtractor(pageUrl) {
  setProgress(45);
  setLoadingStatus('Iniciando extrator de vídeo...');

  // Remove iframe anterior se existir
  const old = document.getElementById('extractorFrame');
  if (old) old.remove();

  // Cria iframe oculto passando URL via query param para auto-scan
  const iframe = document.createElement('iframe');
  iframe.id = 'extractorFrame';
  iframe.src = 'video-extractor.html?url=' + encodeURIComponent(pageUrl);
  iframe.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;border:none;left:-9999px;top:-9999px;';
  document.body.appendChild(iframe);

  // Timeout geral: 30 segundos
  const timeout = setTimeout(() => {
    cleanup();
    triggerExtractorProxy(pageUrl);
  }, 30000);

  function cleanup() {
    clearTimeout(timeout);
    window.removeEventListener('message', onMessage);
    const f = document.getElementById('extractorFrame');
    if (f) f.remove();
  }

  function onMessage(e) {
    if (!e.data || e.data.type !== 'CINELIST_RESULT') return;
    cleanup();
    const urls = e.data.urls || [];
    setProgress(90);
    if (urls.length > 0) {
      handleExtractedUrls(urls);
    } else {
      triggerExtractorProxy(pageUrl);
    }
  }

  window.addEventListener('message', onMessage);

  // Quando o iframe carregar, envia o comando de scan
  iframe.onload = () => {
    setProgress(60);
    setLoadingStatus('Analisando página em busca de vídeos...');
    try {
      iframe.contentWindow.postMessage({ type: 'CINELIST_SCAN', url: pageUrl }, '*');
    } catch(e) {
      cleanup();
      triggerExtractorProxy(pageUrl);
    }
  };

  iframe.onerror = () => {
    cleanup();
    triggerExtractorProxy(pageUrl);
  };
}

// Fallback: extração inline via proxy CORS
async function triggerExtractorProxy(url) {
  setProgress(50);
  setLoadingStatus('Tentando via proxy...');

  try {
    const { text: html } = await fetchWithProxy(url);
    setProgress(78);
    setLoadingStatus('Analisando HTML em busca de vídeos...');

    const found = extractVideoUrls(html, url);
    const urls  = [...new Set(found)];

    setProgress(90);

    if (urls.length > 0) {
      handleExtractedUrls(urls);
    } else {
      setProgress(100);
      setLoadingStatus('Tentando reproduzir link diretamente...', '');
      setTimeout(() => {
        hideLoading();
        loadVideo(url);
        showToast('Reproduzindo link direto', 'success');
      }, 700);
    }

  } catch(err) {
    setProgress(100);
    setLoadingStatus('Proxy falhou. Tentando link direto...', '');
    setTimeout(() => {
      hideLoading();
      loadVideo(url);
      showToast('Reproduzindo link direto', 'success');
    }, 1000);
  }
}

// ══════════════════════════════════════════════════════
//  TRATA URLs EXTRAÍDAS
// ══════════════════════════════════════════════════════
function handleExtractedUrls(urls) {
  videoUrlsList = urls;

  if (!urls || urls.length === 0) {
    setProgress(100);
    setLoadingStatus('Nenhum vídeo encontrado na página.', 'err');
    setTimeout(() => {
      hideLoading();
      showNoStream('Não foi possível extrair o link de vídeo desta página.');
    }, 1600);
    return;
  }

  setProgress(95);
  setLoadingStatus(`✓ ${urls.length} link(s) encontrado(s)! Abrindo player...`, 'ok');

  // Monta botões de qualidade
  buildQualityButtons(urls);

  // Inicia com o melhor link disponível
  setTimeout(() => {
    setProgress(100);
    hideLoading();
    loadVideo(urls[0]);
    showToast(`${urls.length} link(s) disponível(eis)`, 'success');
  }, 800);
}

// ══════════════════════════════════════════════════════
//  PLAYER HLS.js
// ══════════════════════════════════════════════════════
function loadVideo(url) {
  const video  = document.getElementById('mainVideo');
  const banner = document.getElementById('playerBanner');
  const bar    = document.getElementById('playerMetaBar');
  const title  = document.getElementById('playerMovieTitle');

  banner.style.display = 'none';
  video.style.display  = 'block';
  bar.style.display    = 'flex';

  const t = currentMovie
    ? (currentMovie.titulo || currentMovie.title || 'Sem título')
    : 'Reproduzindo';
  title.textContent = t;

  // Destroi instância anterior
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

  const isM3U8 = /m3u8/i.test(url) || url.includes('m3u8');

  if (isM3U8 && Hls.isSupported()) {
    hlsInstance = new Hls({
      enableWorker: true,
      lowLatencyMode: false,
      backBufferLength: 60,
    });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
    });
    hlsInstance.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        // Erro silencioso — não exibe banner
        console.warn('HLS error:', data.type, data.details);
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl') && isM3U8) {
    // Safari nativo
    video.src = url;
    video.play().catch(() => {});
  } else {
    // MP4 / outros
    video.src = url;
    video.play().catch(() => {});
  }

  // Marca botão ativo
  document.querySelectorAll('.quality-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.url === url);
  });
}

function buildQualityButtons(urls) {
  const wrap = document.getElementById('qualityWrap');
  wrap.innerHTML = '';

  const limited = urls.slice(0, 3); // máximo 3 opções
  limited.forEach((url, i) => {
    const btn = document.createElement('button');
    btn.className = 'quality-btn' + (i === 0 ? ' active' : '');
    btn.dataset.url = url;
    btn.textContent = `Opção ${i + 1}`;
    btn.title = url;
    btn.onclick = () => loadVideo(url);
    wrap.appendChild(btn);
  });
}

// ══════════════════════════════════════════════════════
//  INFO DO FILME
// ══════════════════════════════════════════════════════
async function populateMovieInfo(movie) {
  const title    = movie.titulo || movie.title || 'Sem título';
  const year     = movie.ano    || movie.year  || '';
  const rating   = movie.nota   || movie.vote_average || 0;
  const overview = movie.overview || movie.sinopse || '';
  const genres   = movie.generos || movie.genres || [];
  const tmdbId   = movie.id      || movie.tmdb_id || null;

  document.getElementById('movieDetailsTitle').textContent = title;

  // Meta chips
  const meta = document.getElementById('movieDetailsMeta');
  meta.innerHTML =
    `<span class="meta-tag meta-tv">📺 Série</span>` +
    (year   ? `<span class="meta-tag meta-year">${year}</span>` : '') +
    (rating ? `<span class="meta-tag meta-rat">★ ${Number(rating).toFixed(1)}</span>` : '') +
    (Array.isArray(genres) ? genres.slice(0,3).map(g =>
      `<span class="meta-tag meta-genre">${typeof g === 'object' ? g.name : g}</span>`
    ).join('') : '');

  document.getElementById('movieOverview').textContent = overview;

  // Poster lateral
  let posterUrl = movie.poster || null;
  if (!posterUrl && tmdbId) posterUrl = await fetchPoster(tmdbId);

  const side = document.getElementById('moviePosterSide');
  if (posterUrl) {
    side.innerHTML = `<img src="${posterUrl}" alt="${title}" loading="lazy">`;
  } else {
    side.innerHTML = `<div class="movie-poster-placeholder">🎬</div>`;
  }

  // Se não tem overview, busca no TMDB
  if (!overview && tmdbId) {
    fetchTmdbDetails(tmdbId).then(d => {
      if (d && d.overview) {
        document.getElementById('movieOverview').textContent = d.overview;
      }
    });
  }
}

// ══════════════════════════════════════════════════════
//  TMDB helpers (séries usam /tv/)
// ══════════════════════════════════════════════════════
const posterCache = {};

async function fetchPoster(tmdbId) {
  if (!tmdbId) return null;
  if (posterCache[tmdbId] !== undefined) return posterCache[tmdbId];
  try {
    // Tenta /tv/ primeiro, fallback /movie/
    let url = `https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${TMDB_KEY}&language=pt-BR`;
    let r   = await fetch(url);
    if (!r.ok) {
      url = `https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${TMDB_KEY}&language=pt-BR`;
      r   = await fetch(url);
    }
    if (!r.ok) { posterCache[tmdbId] = null; return null; }
    const d = await r.json();
    posterCache[tmdbId] = d.poster_path ? TMDB_IMG + d.poster_path : null;
    return posterCache[tmdbId];
  } catch(e) { posterCache[tmdbId] = null; return null; }
}

async function fetchTmdbDetails(tmdbId) {
  try {
    let r = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${TMDB_KEY}&language=pt-BR`);
    if (!r.ok) r = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${TMDB_KEY}&language=pt-BR`);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

// Busca thumb de episódio via TMDB /tv/{id}/season/{s}/episode/{e}
const epThumbCache = {};
async function fetchEpThumb(seriesId, seasonNum, epNum) {
  const key = `${seriesId}_${seasonNum}_${epNum}`;
  if (epThumbCache[key] !== undefined) return epThumbCache[key];
  try {
    const r = await fetch(
      `https://api.themoviedb.org/3/tv/${seriesId}/season/${seasonNum}/episode/${epNum}?api_key=${TMDB_KEY}&language=pt-BR`
    );
    if (!r.ok) { epThumbCache[key] = null; return null; }
    const d = await r.json();
    epThumbCache[key] = d.still_path ? 'https://image.tmdb.org/t/p/w300' + d.still_path : null;
    return epThumbCache[key];
  } catch(e) { epThumbCache[key] = null; return null; }
}

// ══════════════════════════════════════════════════════
//  CARREGAR FILME POR ID (fallback)
// ══════════════════════════════════════════════════════
async function loadMovieById(id) {
  if (!ghCfg.repo) return null;
  try {
    const base = ghCfg.path ? ghCfg.path + '/' : '';
    const url  = `https://api.github.com/repos/${ghCfg.repo}/contents/${base}filmes.json`;
    const r    = await fetch(url, { headers: { Accept: 'application/vnd.github.v3+json' }});
    if (!r.ok) return null;
    const d    = await r.json();
    const list = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,'')))));
    const arr  = Array.isArray(list) ? list : (list.movies || []);
    return arr.find(m => String(m.id || m.tmdb_id) === String(id)) || null;
  } catch(e) { return null; }
}

// ══════════════════════════════════════════════════════
//  SUGESTÕES — só séries
// ══════════════════════════════════════════════════════
async function loadSuggestions() {
  const grid = document.getElementById('suggestionsGrid');

  // Cache de sessão
  try {
    const cached = sessionStorage.getItem('cinelist_all_series');
    if (cached) {
      allSeries = JSON.parse(cached);
      renderSuggestions(allSeries);
      return;
    }
  } catch(e) {}

  // Tenta raw do GitHub
  const rawUrls = [
    'https://raw.githubusercontent.com/Itamar-Lino/Itflix/refs/heads/main/series.json',
  ];
  if (ghCfg.repo) {
    const base = ghCfg.path ? ghCfg.path + '/' : '';
    rawUrls.unshift(`https://raw.githubusercontent.com/${ghCfg.repo}/refs/heads/main/${base}series.json`);
  }

  let list = null;
  for (const url of rawUrls) {
    try {
      const r = await fetch(url);
      if (r.ok) { list = await r.json(); break; }
    } catch(e) {}
  }

  if (!list && ghCfg.repo) {
    try {
      const base = ghCfg.path ? ghCfg.path + '/' : '';
      const r = await fetch(`https://api.github.com/repos/${ghCfg.repo}/contents/${base}series.json`,
        { headers: { Accept: 'application/vnd.github.v3+json' } });
      if (r.ok) {
        const d = await r.json();
        list = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,'')))));
      }
    } catch(e) {}
  }

  if (!list || !Array.isArray(list)) {
    grid.innerHTML = '<p style="color:var(--muted);font-size:0.8rem;grid-column:1/-1">Não foi possível carregar sugestões.</p>';
    return;
  }

  allSeries = list;
  try { sessionStorage.setItem('cinelist_all_series', JSON.stringify(allSeries)); } catch(e) {}
  renderSuggestions(allSeries);
}

function renderSuggestions(series) {
  const grid = document.getElementById('suggestionsGrid');
  const currentId = currentMovie ? String(currentMovie.id || currentMovie.tmdb_id || '') : '';

  let pool = series.filter(s => String(s.id || s.tmdb_id || '') !== currentId);
  pool = pool.sort(() => Math.random() - 0.5).slice(0, 6);

  grid.innerHTML = pool.map(s => {
    const t   = s.titulo || s.title || s.name || 'Sem título';
    const y   = s.ano || s.year || (s.first_air_date || '').slice(0,4) || '';
    const rat = s.nota || s.vote_average || 0;
    const id  = s.id || s.tmdb_id || '';

    const ratingHtml = rat ? `<div class="sug-rating">★ ${Number(rat).toFixed(1)}</div>` : '';
    const noPosterHtml = `<div class="sug-no-poster">📺</div>`;

    return `<div class="sug-card" data-tmdb="${id}" onclick="openSeries(${JSON.stringify(s).replace(/"/g,'&quot;')})">
      <div class="sug-poster-wrap">
        <div class="sug-no-poster" id="sug-ph-${id}">📺</div>
        ${ratingHtml}
        <div class="sug-overlay">
          <button class="sug-play-btn">▶ Assistir</button>
        </div>
      </div>
      <div class="sug-body">
        <div class="sug-title">${t}</div>
        <div class="sug-year">${y}</div>
      </div>
    </div>`;
  }).join('');

  // Busca posters via TMDB
  pool.forEach(s => {
    const id = s.id || s.tmdb_id || '';
    if (!id) return;
    const posterUrl = s.poster || null;
    if (posterUrl) {
      injectSugPoster(id, posterUrl);
    } else {
      fetchPoster(id).then(url => { if (url) injectSugPoster(id, url); });
    }
  });
}

function injectSugPoster(id, url) {
  document.querySelectorAll(`.sug-card[data-tmdb="${id}"]`).forEach(card => {
    const ph = card.querySelector('.sug-no-poster');
    if (!ph) return;
    const img = document.createElement('img');
    img.src = url; img.alt = ''; img.loading = 'lazy';
    img.onerror = () => img.remove();
    ph.parentNode.insertBefore(img, ph);
    ph.style.display = 'none';
  });
}

function openSeries(serie) {
  try { sessionStorage.setItem('cinelist_player_movie', JSON.stringify(serie)); } catch(e) {}
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => {
    const url = new URL(window.location.href);
    url.searchParams.set('id', serie.id || serie.tmdb_id || '');
    history.pushState({}, '', url.toString());
    location.reload();
  }, 200);
}

// ══════════════════════════════════════════════════════
//  EPISÓDIOS DA SÉRIE
// ══════════════════════════════════════════════════════
async function loadSeriesEpisodes(seriesId) {
  if (!seriesId) return;
  try {
    const cacheKey = 'cinelist_series_' + seriesId;
    let seasons = null;
    try {
      const cached = sessionStorage.getItem(cacheKey);
      if (cached) seasons = JSON.parse(cached);
    } catch(e) {}

    if (!seasons) {
      const rawUrls = ['https://raw.githubusercontent.com/Itamar-Lino/Itflix/refs/heads/main/series.json'];
      if (ghCfg.repo) {
        const base = ghCfg.path ? ghCfg.path + '/' : '';
        rawUrls.unshift(`https://raw.githubusercontent.com/${ghCfg.repo}/refs/heads/main/${base}series.json`);
      }
      let list = null;
      for (const url of rawUrls) {
        try { const r = await fetch(url); if (r.ok) { list = await r.json(); break; } } catch(e) {}
      }
      if (!list || !Array.isArray(list)) return;
      const serie = list.find(s => String(s.id) === String(seriesId));
      if (!serie || !serie.seasons) return;
      seasons = serie.seasons;
      try { sessionStorage.setItem(cacheKey, JSON.stringify(seasons)); } catch(e) {}
    }

    seriesData = seasons;
    buildSeasonTabs(seasons);
    renderEpScroll(seasons, 0);
    document.getElementById('epBar').style.display = 'block';
  } catch(e) { console.warn('Episódios:', e); }
}

function buildSeasonTabs(seasons) {
  const bar = document.getElementById('seasonTabsBar');
  if (seasons.length <= 1) { bar.style.display = 'none'; return; }
  bar.innerHTML = seasons.map((s, i) => {
    const label = s.season_number === 0 ? 'Especiais' : 'T' + s.season_number;
    return `<div class="s-tab${i === 0 ? ' active' : ''}" onclick="selectSeason(${i})">${label}</div>`;
  }).join('');
}

function selectSeason(idx) {
  if (!seriesData) return;
  document.querySelectorAll('.s-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  renderEpScroll(seriesData, idx);
}

function renderEpScroll(seasons, idx) {
  const eps    = seasons[idx]?.episodes || [];
  const scroll = document.getElementById('epScroll');
  const sNum   = seasons[idx]?.season_number ?? idx;
  const seriesId = currentMovie ? (currentMovie.id || currentMovie.tmdb_id) : null;

  if (!eps.length) {
    scroll.innerHTML = '<p style="color:var(--muted);font-size:0.78rem;padding:4px 0">Nenhum episódio nesta temporada.</p>';
    return;
  }

  scroll.innerHTML = eps.map(ep => {
    const hasUrl    = !!(ep.video_link && ep.video_link.trim());
    const isPlaying = hasUrl && currentEpUrl && ep.video_link.trim() === currentEpUrl;
    const name      = ep.name || 'Episódio ' + ep.episode_number;
    const urlEsc    = hasUrl ? ep.video_link.trim().replace(/\\/g,'\\\\').replace(/'/g,"\\'") : '';
    const nameEsc   = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

    // Usa still_path do JSON se disponível; senão placeholder (TMDB carrega depois)
    const thumbHtml = ep.still_path
      ? `<img src="https://image.tmdb.org/t/p/w300${ep.still_path}" alt="${name}" loading="lazy">`
      : `<div class="ep-thumb-ph" id="epth-${sNum}-${ep.episode_number}">🎬</div>`;

    return `<div class="ep-card${isPlaying ? ' playing' : ''}${!hasUrl ? ' unavailable' : ''}"
      data-url="${hasUrl ? ep.video_link.trim().replace(/"/g,'&quot;') : ''}"
      data-snum="${sNum}" data-epnum="${ep.episode_number}"
      ${hasUrl ? `onclick="playEp('${urlEsc}','${nameEsc}')"` : ''}>
      ${isPlaying ? '<div class="ep-card-now">Assistindo</div>' : ''}
      <div class="ep-card-thumb">
        ${thumbHtml}
        <div class="ep-card-thumb-overlay">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
      <div class="ep-card-body">
        <div class="ep-card-num">EP ${ep.episode_number}</div>
        <div class="ep-card-name">${name}</div>
      </div>
    </div>`;
  }).join('');

  // Carrega thumbs via TMDB para quem não tem still_path
  if (seriesId) {
    eps.forEach(ep => {
      if (ep.still_path) return; // já tem
      const ph = document.getElementById(`epth-${sNum}-${ep.episode_number}`);
      if (!ph) return;
      fetchEpThumb(seriesId, sNum, ep.episode_number).then(url => {
        if (!url || !ph.parentNode) return;
        const img = document.createElement('img');
        img.src = url; img.alt = ''; img.loading = 'lazy';
        ph.parentNode.replaceChild(img, ph);
      });
    });
  }

  // Rola até o ep em reprodução
  setTimeout(() => {
    const playing = scroll.querySelector('.ep-card.playing');
    if (playing) playing.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 150);
}

function playEp(url, epName) {
  if (!url) return;
  currentEpUrl = url;

  // Atualiza visuais — comparação EXATA por data-url
  document.querySelectorAll('.ep-card').forEach(card => {
    const isThis = card.dataset.url === url;
    card.classList.toggle('playing', isThis);
    let badge = card.querySelector('.ep-card-now');
    if (isThis && !badge) {
      badge = document.createElement('div');
      badge.className = 'ep-card-now';
      badge.textContent = 'Assistindo';
      card.prepend(badge);
    } else if (!isThis && badge) {
      badge.remove();
    }
  });

  // Título no player
  const serieTitle = currentMovie ? (currentMovie.titulo || currentMovie.title || '') : '';
  const titleEl = document.getElementById('playerMovieTitle');
  if (titleEl) titleEl.textContent = serieTitle ? `${serieTitle} — ${epName}` : epName;

  // Reproduz
  if (isDirectVideoUrl(url)) {
    loadVideo(url);
  } else {
    document.getElementById('loadingOverlay').classList.remove('hidden');
    setProgress(15);
    setLoadingStatus('Carregando episódio...');
    triggerExtractor(url);
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════
//  UI helpers
// ══════════════════════════════════════════════════════
function showNoStream(msg) {
  const box = document.getElementById('noStreamBox');
  document.getElementById('noStreamMsg').textContent = msg;

  // Adiciona botão de abrir link externamente se houver video_link
  const link = currentMovie && currentMovie.video_link ? currentMovie.video_link.trim() : null;
  const existingBtn = box.querySelector('.open-ext-btn');
  if (existingBtn) existingBtn.remove();

  if (link) {
    const btn = document.createElement('a');
    btn.className = 'open-ext-btn';
    btn.href = link;
    btn.target = '_blank';
    btn.rel = 'noopener';
    btn.textContent = '↗ Abrir link';
    btn.style.cssText = `
      margin-left: auto; flex-shrink: 0;
      background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.35);
      color: var(--accent); border-radius: 8px;
      padding: 7px 14px; font-size: 0.78rem; font-weight: 700;
      text-decoration: none; white-space: nowrap;
    `;
    box.appendChild(btn);
  }

  box.classList.add('visible');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = type || 'success';
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
